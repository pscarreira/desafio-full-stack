services:
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_root
      MONGO_INITDB_ROOT_PASSWORD: mongo_root_password
      MONGO_APP_USERNAME: testeprefeitura
      MONGO_APP_PASSWORD: testebancoprefeitura
      MONGO_APP_DATABASE: desafio-full-stack
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo/init-user.sh:/docker-entrypoint-initdb.d/init-user.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet
            mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD\
            @localhost:27017/admin --eval \"quit(db.runCommand({ ping: 1 }).ok ?
            0 : 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    environment: *api-env
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001').then(() =>
            process.exit(0)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://' + process.env.HOSTNAME + ':3000').then(()
            => process.exit(0)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mongo-data:
